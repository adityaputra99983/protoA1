{% extends 'tedapp/base.html' %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="card-ted p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-brush fs-1" style="color: var(--accent-purple);"></i>
                        <h2 class="section-title mt-2">Daftar di TED</h2>
                        <p style="color: var(--text-secondary);">Bergabung dengan komunitas seniman tato terbaik!</p>
                    </div>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" required placeholder="Masukkan username...">
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required placeholder="Masukkan email...">
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required placeholder="Masukkan password...">
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">No. Telepon (opsional)</label>
                            <input type="tel" name="phone" class="form-control" placeholder="08xxxxxxxxxx">
                        </div>
                        
                        <button type="submit" class="btn btn-ted-primary btn-lg w-100">
                            <i class="bi bi-person-plus"></i> Daftar
                        </button>
                    </form>
                    
                    <p class="text-center mt-4" style="color: var(--text-secondary);">
                        Sudah punya akun? 
                        <a href="{% url 'login' %}" style="color: var(--accent-purple);">Masuk di sini</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
